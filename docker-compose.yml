services:
  postgres:
    image: postgres:16
    container_name: peg-postgres
    environment:
      POSTGRES_USER: peg
      POSTGRES_PASSWORD: peg
      POSTGRES_DB: peg
    ports:
      - "5432:5432"
    volumes:
      - peg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  peg-postgres-data:
